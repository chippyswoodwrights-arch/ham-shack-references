# Locale
d-i debian-installer/locale string en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us

# Network — hostname defaults to 'wyse', change per device after install
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string wyse
d-i netcfg/get_domain string

# Mirror
d-i mirror/country string US
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string

# Clock
d-i clock-setup/utc boolean true
d-i time/zone string America/Los_Angeles

# Root password — DEFAULT, change after install
d-i passwd/root-password password octoprint123
d-i passwd/root-password-again password octoprint123

# User account — DEFAULT, change after install
d-i passwd/user-fullname string matt
d-i passwd/username string matt
d-i passwd/user-password password octoprint123
d-i passwd/user-password-again password octoprint123

# Partitioning
d-i partman-auto/method string regular
d-i partman-auto/choose_recipe select atomic
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

# Packages — SSH server only, no desktop
tasksel tasksel/first multiselect
d-i pkgsel/include string openssh-server sudo
d-i pkgsel/upgrade select full-upgrade
popularity-contest popularity-contest/participate boolean false

# Bootloader
d-i grub-installer/only_debian boolean true
d-i grub-installer/bootdev string default

# Finish
d-i finish-install/reboot_in_progress note

# Late command — fix SSH, install default key, set sudoers
# DEFAULT KEY: wyse_default — replace with personal key after first login
d-i preseed/late_command string \
  in-target sed -i 's/^#\?PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config; \
  in-target sed -i 's/^#\?PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config; \
  in-target systemctl enable ssh; \
  in-target sh -c 'echo "matt ALL=(ALL) NOPASSWD:ALL" > /etc/sudoers.d/matt'; \
  in-target mkdir -p /home/matt/.ssh; \
  in-target sh -c 'echo "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIHREsg5/GGhrCVl2N15Nm4mRjmVOuosBTq0die/QbgBn wyse-default-key" > /home/matt/.ssh/authorized_keys'; \
  in-target chmod 700 /home/matt/.ssh; \
  in-target chmod 600 /home/matt/.ssh/authorized_keys; \
  in-target chown -R matt:matt /home/matt/.ssh
